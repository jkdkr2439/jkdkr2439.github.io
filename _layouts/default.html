<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.excerpt_text | default: site.description | strip_html | truncate: 160 }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<nav>
  <a class="nav-logo" href="{{ '/' | relative_url }}">Kevin T.N</a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Bài viết</a></li>
    <li><a href="{{ '/about' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>Về tác giả</a></li>
  </ul>
</nav>

<main>
{{ content }}
</main>

<footer>
  © {{ 'now' | date: "%Y" }} · Kevin T.N · Viết bằng tay, không bằng template
</footer>

</body>
</html>
